name: Build And Deploy

on:
  push:
    branches:
      - main

env:
  API_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/jd_matcher_ai:latest
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/jd_matcher_ai_ui:latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate CI/CD configuration
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PROJECT_DIR: ${{ vars.SERVER_PROJECT_DIR }}
        run: |
          set -euo pipefail
          test -n "$DOCKERHUB_USERNAME"
          test -n "$DOCKERHUB_TOKEN"
          test -n "$SERVER_HOST"
          test -n "$SERVER_USER"
          test -n "$SERVER_PORT"
          test -n "$SERVER_SSH_KEY"
          test -n "$SERVER_PROJECT_DIR"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.API_IMAGE }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./ui/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}

      - name: Publish build summary
        run: |
          {
            echo "## CI/CD Result"
            echo "- Backend image pushed: $API_IMAGE"
            echo "- Frontend image pushed: $FRONTEND_IMAGE"
            echo "- Next step: remote deployment over SSH"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ vars.SERVER_PROJECT_DIR }}"
            docker compose pull
            docker compose up -d

      - name: Publish deployment summary
        if: success()
        run: |
          {
            echo "- Deployment success: docker compose pull + up -d completed on server"
          } >> "$GITHUB_STEP_SUMMARY"