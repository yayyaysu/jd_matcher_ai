name: CI - Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/jd_matcher_ai:latest

      - name: Publish build summary
        run: |
          {
            echo "## CI Result"
            echo "- Docker Hub login success"
            echo "- Backend image pushed: ${{ secrets.DOCKERHUB_USERNAME }}/jd_matcher_ai:latest"
            echo "- No deployment step is configured in this workflow"
          } >> "$GITHUB_STEP_SUMMARY"