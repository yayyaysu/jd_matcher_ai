services:
  api:
    image: ${DOCKERHUB_USERNAME:-ian61236123}/jd_matcher_ai:latest
    pull_policy: always
    container_name: jd_matcher_v2_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: ${DOCKERHUB_USERNAME:-ian61236123}/jd_matcher_ai_ui:latest
    pull_policy: always
    container_name: jd_matcher_v2_frontend
    restart: unless-stopped
    environment:
      API_BASE_URL: ${API_BASE_URL}
    ports:
      - "8501:8501"
    command: ["streamlit", "run", "/app/ui/app.py", "--server.address=0.0.0.0", "--server.port=8501", "--server.headless=true"]
    depends_on:
      api:
        condition: service_started

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: jd_matcher_v2_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: jd_matcher_v2_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:latest
    container_name: jd_matcher_v2_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql_data:
  redis_data:
